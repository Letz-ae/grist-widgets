<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badges - A4 Print Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Barlow", sans-serif;
            font-size: 3.5mm;
            color: #555;
            background: white;
        }

        /* Single container that spans all pages */
        .badges-container {
            width: 210mm;
            margin: 0 auto;
            padding: 10mm;
            display: flex;
            flex-wrap: wrap;
            gap: 5mm;
            align-content: flex-start;
        }

        /* Individual badge container */
        .badge-container {
            width: 85mm;
            height: 55mm;
            position: relative;
            border: 0.5mm solid #eee;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .badge-container img.background {
            width: 100%;
            height: 100%;
        }

        .content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .id {
            top: 14.4mm;
            left: 66mm;
            font-size: 2.5mm;
        }

        .name {
            top: 24mm;
            left: 44mm;
            width: 39mm;
            line-height: 3mm;
            font-weight: 600;
        }

        .position {
            top: 30mm;
            left: 44mm;
            font-size: 3mm;
        }

        .company {
            top: 35mm;
            left: 44mm;
            font-weight: 500;
        }

        .issue {
            top: 40.5mm;
            left: 44mm;
            font-size: 2.8mm;
        }

        .expiration {
            top: 46mm;
            left: 44mm;
            font-size: 2.8mm;
        }

        .photo {
            top: 25mm;
            left: 5mm;
            width: 20mm;
            height: 25mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1mm solid #ccc;
            border-radius: 1mm;
            background: white;
        }

        .photo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        /* Print styles - let CSS handle page breaks naturally */
        @media print {
            body {
                margin: 0;
                padding: 0;
            }
            
            .badges-container {
                margin: 0;
                padding: 10mm;
                box-shadow: none;
            }
            
            .badge-container {
                border: 0.3mm solid #ddd;
            }
            
            /* Hide non-essential elements when printing */
            .no-print {
                display: none !important;
            }
        }

        /* Screen styles */
        @media screen {
            body {
                background: #f5f5f5;
                padding: 20px;
            }
            
            .badges-container {
                background: white;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
                margin-bottom: 20px;
            }
            
            .controls {
                background: white;
                padding: 20px;
                margin-bottom: 20px;
                border-radius: 5px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            }
            
            button {
                background: #007bff;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
                font-size: 14px;
                margin-right: 10px;
            }
            
            button:hover {
                background: #0056b3;
            }
        }

        /* Utility classes for positioning */
        .absolute { position: absolute; }
        .text-center { text-align: center; }
        .font-bold { font-weight: bold; }
    </style>
</head>
<body>
    <div class="controls no-print">
        <h2>Badge Printing Layout</h2>
        <p>This layout uses natural flow for badges across A4 pages</p>
        <button onclick="window.print()">Print Badges</button>
    </div>

    <!-- All badges in a single container that spans pages -->
    <div id="badges-container" class="badges-container"></div>

    <script>
        let allRecords = [];
        let tokenInfo = null;

        async function generateBadge(record) {
            const photoURL = await getPhotoURL(record.Photo);
            return `
                <div class="badge-container">
                    <div class="content id absolute">${record.Employee_ID || ''}</div>
                    <div class="content name absolute">${record.Full_Name || ''}</div>
                    <div class="content position absolute">${record.Position || ''}</div>
                    <div class="content company absolute">LETZ</div>
                    <div class="content issue absolute">Issued: ${formatDate(record.Contract_Date)}</div>
                    <div class="content expiration absolute">${formatDate(record.Contract_Expiration)}</div>
                    
                    <div class="content photo absolute">
                        <img src="${photoURL || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZGRkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxOCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPlBob3RvPC90ZXh0Pjwvc3ZnPg=='}" alt="ID Photo">
                    </div>
                    <img class="background" src="https://cdn.soloist.ai/3574a624-2397-40a5-983a-c2030d8ba2b7/a919ac76-f7a5-4a9c-8c07-93b39c252509_2048x2048.webp" alt="Badge Background" />
                </div>
            `;
        }

        async function getPhotoURL(attachmentId) {
            if (!attachmentId || !tokenInfo) return '';
            try {
                return `${tokenInfo.baseUrl}/attachments/${attachmentId}/download?auth=${tokenInfo.token}`;
            } catch (error) {
                console.error('Error getting photo URL:', error);
                return '';
            }
        }

        function formatDate(date) {
            if (!date || !(date instanceof Date) || isNaN(date)) return '';
            return [
                String(date.getDate()).padStart(2, '0'),
                String(date.getMonth() + 1).padStart(2, '0'),
                date.getFullYear()
            ].join('/');
        }

        function generateBadges(records) {
            const badgesContainer = document.getElementById('badges-container');
            badgesContainer.innerHTML = '';
            
            if (records.length === 0) return;
            
            // Generate all badges in a single container
            Promise.all(records.map(record => generateBadge(record)))
                .then(badges => {
                    badgesContainer.innerHTML = badges.join('');
                });
        }

        // Grist integration
        grist.ready();
        
        // Get access token for photo URLs
        grist.docApi.getAccessToken({ readOnly: true }).then(token => {
            tokenInfo = token;
        });

        // Handle records from Grist
        grist.onRecord(function(record) {
            // For single record display, create array with just this record
            allRecords = [record];
            generateBadges(allRecords);
        });

        // Handle table data for multiple records
        grist.onRecords(function(records) {
            allRecords = records || [];
            generateBadges(allRecords);
        });

        // Handle ready event
        grist.ready({
            requiredAccess: 'read table',
            columns: [
                'Employee_ID',
                'Full_Name', 
                'Position',
                'Contract_Date',
                'Contract_End',
                'Photo'
            ]
        });
    </script>
</body>
</html>
