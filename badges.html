<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badges - A4 Print Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <style>

        :root {
            --badge-w: 8.56cm;
            --badge-h: 5.40cm;
            --badge-gap-screen: 0.4cm;
            --badge-gap-print: 0.3cm;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Barlow", sans-serif;
            font-size: 0.35cm;
            color: #555;
            background: white;
        }

        /* Single container that spans all pages */
        .badges-container {
            width: 19cm;
            margin: 0 auto;
            padding: 1cm 0;
            display: flex;
            flex-wrap: wrap;
            gap: var(--badge-gap-screen);
            align-content: flex-start;
        }

        /* Individual badge container */
        .badge-container {
            width: var(--badge-w);
            height: var(--badge-h);
            position: relative;
            border: 0.03cm solid #cfcfcf;
            page-break-inside: avoid;
            break-inside: avoid;
            overflow: hidden;
            background: #fff;
        }

        .badge-container img.background {
            width: 100%;
            height: 100%;
        }

        .content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .id {
            top: 1.44cm;
            left: 6.6cm;
            font-size: 0.25cm;
        }

        .name {
            top: 2.4cm;
            left: 4.4cm;
            width: 3.9cm;
            line-height: 0.3cm;
            font-weight: 600;
        }

        .position {
            top: 3cm;
            left: 4.4cm;
            font-size: 0.3cm;
        }

        .company {
            top: 3.5cm;
            left: 4.4cm;
            font-weight: 500;
            font-size: 0.35cm;
        }

        .issue {
            top: 4.05cm;
            left: 4.4cm;
            font-size: 0.28cm;
        }

        .expiration {
            top: 4.6cm;
            left: 4.4cm;
            font-size: 0.28cm;
        }

        .photo {
            top: 2.5cm;
            left: 0.5cm;
            width: 2cm;
            height: 2.5cm;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 0.1cm solid #ccc;
            border-radius: 0.1cm;
            background: white;
        }

        .photo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        /* ─── PRINT STYLES ─────────────────────────────────────────────────────────
           The critical fix: browsers apply a default "fit to page" scaling when
           printing. We force scale(1) by setting the page to exactly 21cm × 29.7cm
           with zero margins and locking html/body to those exact dimensions so the
           browser has no reason to shrink content.
        ──────────────────────────────────────────────────────────────────────────── */
        @media print {
            @page {
                size: 21cm 29.7cm;   /* explicit A4, not the keyword "A4" */
                margin: 0;
            }

            html {
                width: 21cm;
                height: 29.7cm;
                /* Prevent any UA zoom / fit-to-page scaling */
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            body {
                width: 21cm;
                margin: 0;
                padding: 0;
                background: white;
            }

            .badges-container {
                /* Two badges side-by-side with known gap ─ total ≈ 17.42cm, centred on 21cm */
                width: calc(var(--badge-w) * 2 + var(--badge-gap-print));
                margin: 1cm auto 0;
                padding: 0;
                box-shadow: none;
                display: grid;
                grid-template-columns: repeat(2, var(--badge-w));
                grid-auto-rows: var(--badge-h);
                column-gap: var(--badge-gap-print);
                row-gap: var(--badge-gap-print);
                justify-content: center;
                align-content: start;
            }

            .badge-container {
                border: 0.03cm solid #c0c0c0;
            }

            .no-print {
                display: none !important;
            }
        }

        /* Screen styles */
        @media screen {
            body {
                background: #f5f5f5;
                padding: 20px;
            }

            .badges-container {
                background: white;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
                margin-bottom: 20px;
            }

            .controls {
                background: white;
                padding: 20px;
                margin-bottom: 20px;
                border-radius: 5px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            }

            button {
                background: #007bff;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
                font-size: 14px;
                margin-right: 10px;
            }

            .size-preset-control {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                font-size: 14px;
                color: #334155;
                margin-left: 6px;
            }

            .size-preset-control select {
                padding: 6px 8px;
                border: 1px solid #cbd5e1;
                border-radius: 5px;
                font-size: 14px;
                background: #fff;
                color: #0f172a;
            }

            button:hover {
                background: #0056b3;
            }
        }

        /* Utility classes for positioning */
        .absolute { position: absolute; }
        .text-center { text-align: center; }
        .font-bold { font-weight: bold; }
    </style>
</head>
<body>
    <div class="controls no-print">
        <h2>Badge Printing Layout</h2>
        <p>This layout uses natural flow for badges across A4 pages</p>
        <button onclick="window.print()">Print Badges</button>
        <label class="size-preset-control" for="badge-size-preset">
            Badge size
            <select id="badge-size-preset" onchange="setBadgeSizePreset(this.value)">
                <option value="credit" selected>Credit card (8.56 × 5.40 cm)</option>
                <option value="small">Small (8.40 × 5.30 cm)</option>
                <option value="wide">Wider (8.70 × 5.50 cm)</option>
            </select>
        </label>
    </div>

    <!-- All badges in a single container that spans pages -->
    <div id="badges-container" class="badges-container"></div>

    <script>
        let allRecords = []
        let tokenInfo = null

        const SIZE_PRESETS = {
            credit: { w: 8.56, h: 5.40, gapScreen: 0.4, gapPrint: 0.30 },
            small:  { w: 8.40, h: 5.30, gapScreen: 0.35, gapPrint: 0.15 },
            wide:   { w: 8.70, h: 5.50, gapScreen: 0.35, gapPrint: 0.15 },
        }

        function applySizePreset(name) {
            const p = SIZE_PRESETS[name] || SIZE_PRESETS.credit
            const root = document.documentElement
            root.style.setProperty('--badge-w', `${p.w.toFixed(2)}cm`)
            root.style.setProperty('--badge-h', `${p.h.toFixed(2)}cm`)
            root.style.setProperty('--badge-gap-screen', `${p.gapScreen.toFixed(2)}cm`)
            root.style.setProperty('--badge-gap-print', `${p.gapPrint.toFixed(2)}cm`)
        }

        function setBadgeSizePreset(name) {
            applySizePreset(name)
            try {
                localStorage.setItem('badgeSizePreset', name)
            } catch (_) {}
        }

        function initBadgeSizePreset() {
            let preset = 'credit'
            try {
                const saved = localStorage.getItem('badgeSizePreset')
                if (saved && SIZE_PRESETS[saved]) preset = saved
            } catch (_) {}
            applySizePreset(preset)
            const sel = document.getElementById('badge-size-preset')
            if (sel) sel.value = preset
        }

        async function generateBadge(record) {
            const photoURL = await getPhotoURL(record.Photo)
            const issueDate = record.Contract_Date || record.Training_Date || null
            const expiryDate = record.Contract_Expiration || record.Contract_End || null
            return `
                <div class="badge-container">
                    <div class="content id absolute">${record.Employee_ID || ''}</div>
                    <div class="content name absolute">${record.Full_Name || ''}</div>
                    <div class="content position absolute">${record.Position || ''}</div>
                    <div class="content company absolute">LETZ</div>
                    <div class="content issue absolute">${formatDate(issueDate) || '—'}</div>
                    <div class="content expiration absolute">Exp: ${formatDate(expiryDate) || '—'}</div>

                    <div class="content photo absolute">
                        <img src="${photoURL || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZGRkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxOCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPlBob3RvPC90ZXh0Pjwvc3ZnPg=='}" alt="ID Photo">
                    </div>
                    <img class="background" src="https://cdn.soloist.ai/3574a624-2397-40a5-983a-c2030d8ba2b7/a919ac76-f7a5-4a9c-8c07-93b39c252509_2048x2048.webp" alt="Badge Background" />
                </div>
            `
        }

        function extractAttachmentId(value) {
            if (value == null) return null
            if (typeof value === 'number') return value
            if (typeof value === 'string') {
                const n = Number(value)
                return Number.isFinite(n) ? n : null
            }
            if (Array.isArray(value)) {
                for (const v of value) {
                    const id = extractAttachmentId(v)
                    if (id != null) return id
                }
            }
            if (typeof value === 'object' && typeof value.id === 'number') return value.id
            return null
        }

        async function ensureToken() {
            if (!tokenInfo || tokenInfo.expiresAt < Date.now() + 60000) {
                tokenInfo = await grist.docApi.getAccessToken({ readOnly: true })
                tokenInfo.expiresAt = Date.now() + (tokenInfo.ttlMsecs ?? 3600000)
            }
            return tokenInfo
        }

        async function getPhotoURL(attachmentValue) {
            try {
                const attachmentId = extractAttachmentId(attachmentValue)
                if (!attachmentId) return ''
                const t = await ensureToken()
                return `${t.baseUrl}/attachments/${attachmentId}/download?auth=${t.token}`
            } catch (error) {
                console.error('Error getting photo URL:', error)
                return ''
            }
        }

        function parseDate(value) {
            if (!value || value === 'None') return null
            if (value instanceof Date) return isNaN(value) ? null : value

            if (typeof value === 'number') {
                let d
                if (value > 1e12) {
                    d = new Date(value)
                } else if (value > 1e9) {
                    d = new Date(value * 1000)
                } else {
                    d = new Date(Date.UTC(1970, 0, 1) + (value * 86400000))
                }
                return isNaN(d) ? null : d
            }

            if (typeof value === 'string') {
                const s = value.trim()
                if (!s) return null

                const iso = new Date(s)
                if (!isNaN(iso)) return iso

                const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/)
                if (m) {
                    const d = new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]))
                    return isNaN(d) ? null : d
                }
            }

            return null
        }

        function formatDate(value) {
            const date = parseDate(value)
            if (!date) return ''
            return [
                String(date.getDate()).padStart(2, '0'),
                String(date.getMonth() + 1).padStart(2, '0'),
                date.getFullYear()
            ].join('/')
        }

        function generateBadges(records) {
            const badgesContainer = document.getElementById('badges-container')
            badgesContainer.innerHTML = ''

            if (records.length === 0) return

            Promise.all(records.map(record => generateBadge(record)))
                .then(badges => {
                    badgesContainer.innerHTML = badges.join('')
                })
        }

        // Initialize badge physical-size preset
        initBadgeSizePreset()

        // Grist integration
        grist.ready()

        // Warm token cache for photo URLs
        ensureToken().catch(() => {})

        // Handle records from Grist
        grist.onRecord(function(record) {
            allRecords = [record]
            generateBadges(allRecords)
        })

        // Handle table data for multiple records
        grist.onRecords(function(records) {
            allRecords = records || []
            generateBadges(allRecords)
        })

        // Handle ready event
        grist.ready({
            requiredAccess: 'read table',
            columns: [
                'Employee_ID',
                'Full_Name',
                'Position',
                'Contract_Date',
                'Contract_Start',
                'Contract_Start_Date',
                'Contract_Expiration',
                'Contract_End',
                'Training_Date',
                'Photo'
            ]
        })
    </script>
</body>
</html>
