<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badges - A4 Print Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <style>
        :root {
                    --badge-scale: 1;
                    --badge-print-scale: 1.18;
                }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Barlow", sans-serif;
            font-size: 3.5mm;
            color: #555;
            background: white;
        }

        /* Single container that spans all pages */
        .badges-container {
            width: 210mm;
            margin: 0 auto;
            padding: 10mm;
            display: flex;
            flex-wrap: wrap;
            gap: 5mm;
            align-content: flex-start;
        }

        /* Individual badge container */
        .badge-container {
            width: calc(85.6mm * var(--badge-scale));
            height: calc(54mm * var(--badge-scale));
            position: relative;
            border: 0.5mm solid #eee;
            page-break-inside: avoid;
            break-inside: avoid;
        }

        .badge-container img.background {
            width: 100%;
            height: 100%;
        }

        .content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .id {
            top: calc(14.4mm * var(--badge-scale));
            left: calc(66mm * var(--badge-scale));
            font-size: calc(2.5mm * var(--badge-scale));
        }

        .name {
            top: calc(24mm * var(--badge-scale));
            left: calc(44mm * var(--badge-scale));
            width: calc(39mm * var(--badge-scale));
            line-height: calc(3mm * var(--badge-scale));
            font-weight: 600;
        }

        .position {
            top: calc(30mm * var(--badge-scale));
            left: calc(44mm * var(--badge-scale));
            font-size: calc(3mm * var(--badge-scale));
        }

        .company {
            top: calc(35mm * var(--badge-scale));
            left: calc(44mm * var(--badge-scale));
            font-weight: 500;
            font-size: calc(3.5mm * var(--badge-scale));
        }

        .issue {
            top: calc(40.5mm * var(--badge-scale));
            left: calc(44mm * var(--badge-scale));
            font-size: calc(2.8mm * var(--badge-scale));
        }

        .expiration {
            top: calc(46mm * var(--badge-scale));
            left: calc(44mm * var(--badge-scale));
            font-size: calc(2.8mm * var(--badge-scale));
        }

        .photo {
            top: calc(25mm * var(--badge-scale));
            left: calc(5mm * var(--badge-scale));
            width: calc(20mm * var(--badge-scale));
            height: calc(25mm * var(--badge-scale));
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1mm solid #ccc;
            border-radius: 1mm;
            background: white;
        }

        .photo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }

        /* Print styles - let CSS handle page breaks naturally */
        @media print {
            @page {
                size: A4;
                margin: 10mm;
            }

            :root {
                --badge-scale: var(--badge-print-scale);
            }

            body {
                margin: 0;
                padding: 0;
            }

            .badges-container {
                width: auto;
                margin: 0;
                padding: 0;
                gap: 4mm;
                box-shadow: none;
            }

            .badge-container {
                border: 0.3mm solid #ddd;
            }

            .no-print {
                display: none !important;
            }
        }

        /* Screen styles */
        @media screen {
            body {
                background: #f5f5f5;
                padding: 20px;
            }

            .badges-container {
                background: white;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
                margin-bottom: 20px;
            }

            .controls {
                background: white;
                padding: 20px;
                margin-bottom: 20px;
                border-radius: 5px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            }

            button {
                background: #007bff;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
                font-size: 14px;
                margin-right: 10px;
            }

            button:hover {
                background: #0056b3;
            }
        }

        /* Utility classes for positioning */
        .absolute { position: absolute; }
        .text-center { text-align: center; }
        .font-bold { font-weight: bold; }
    </style>
</head>
<body>
    <div class="controls no-print">
        <h2>Badge Printing Layout</h2>
        <p>This layout uses natural flow for badges across A4 pages</p>
        <button onclick="window.print()">Print Badges</button>
    </div>

    <!-- All badges in a single container that spans pages -->
    <div id="badges-container" class="badges-container"></div>

    <script>
        let allRecords = [];
        let tokenInfo = null;

        async function generateBadge(record) {
            const photoURL = await getPhotoURL(record.Photo);
            const issueDate = record.Contract_Date || record.Training_Date || null;
            const expiryDate = record.Contract_Expiration || record.Contract_End || null;
            return `
                <div class="badge-container">
                    <div class="content id absolute">${record.Employee_ID || ''}</div>
                    <div class="content name absolute">${record.Full_Name || ''}</div>
                    <div class="content position absolute">${record.Position || ''}</div>
                    <div class="content company absolute">LETZ</div>
                    <div class="content issue absolute">${formatDate(issueDate) || '—'}</div>
                    <div class="content expiration absolute">Exp: ${formatDate(expiryDate) || '—'}</div>

                    <div class="content photo absolute">
                        <img src="${photoURL || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZGRkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxOCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPlBob3RvPC90ZXh0Pjwvc3ZnPg=='}" alt="ID Photo">
                    </div>
                    <img class="background" src="https://cdn.soloist.ai/3574a624-2397-40a5-983a-c2030d8ba2b7/a919ac76-f7a5-4a9c-8c07-93b39c252509_2048x2048.webp" alt="Badge Background" />
                </div>
            `;
        }

        function extractAttachmentId(value) {
            if (value == null) return null;
            if (typeof value === 'number') return value;
            if (typeof value === 'string') {
                const n = Number(value);
                return Number.isFinite(n) ? n : null;
            }
            if (Array.isArray(value)) {
                for (const v of value) {
                    const id = extractAttachmentId(v);
                    if (id != null) return id;
                }
            }
            if (typeof value === 'object' && typeof value.id === 'number') return value.id;
            return null;
        }

        async function ensureToken() {
            if (!tokenInfo || tokenInfo.expiresAt < Date.now() + 60000) {
                tokenInfo = await grist.docApi.getAccessToken({ readOnly: true });
                tokenInfo.expiresAt = Date.now() + (tokenInfo.ttlMsecs ?? 3600000);
            }
            return tokenInfo;
        }

        async function getPhotoURL(attachmentValue) {
            try {
                const attachmentId = extractAttachmentId(attachmentValue);
                if (!attachmentId) return '';
                const t = await ensureToken();
                return `${t.baseUrl}/attachments/${attachmentId}/download?auth=${t.token}`;
            } catch (error) {
                console.error('Error getting photo URL:', error);
                return '';
            }
        }

        function parseDate(value) {
            if (!value || value === 'None') return null;
            if (value instanceof Date) return isNaN(value) ? null : value;

            if (typeof value === 'number') {
                // Grist can provide ms timestamps, seconds timestamps, or serial day values.
                let d;
                if (value > 1e12) {
                    d = new Date(value); // milliseconds
                } else if (value > 1e9) {
                    d = new Date(value * 1000); // seconds
                } else {
                    d = new Date(Date.UTC(1970, 0, 1) + (value * 86400000)); // days since epoch
                }
                return isNaN(d) ? null : d;
            }

            if (typeof value === 'string') {
                const s = value.trim();
                if (!s) return null;

                const iso = new Date(s);
                if (!isNaN(iso)) return iso;

                const m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
                if (m) {
                    const d = new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
                    return isNaN(d) ? null : d;
                }
            }

            return null;
        }

        function formatDate(value) {
            const date = parseDate(value);
            if (!date) return '';
            return [
                String(date.getDate()).padStart(2, '0'),
                String(date.getMonth() + 1).padStart(2, '0'),
                date.getFullYear()
            ].join('/');
        }

        function generateBadges(records) {
            const badgesContainer = document.getElementById('badges-container');
            badgesContainer.innerHTML = '';

            if (records.length === 0) return;

            // Generate all badges in a single container
            Promise.all(records.map(record => generateBadge(record)))
                .then(badges => {
                    badgesContainer.innerHTML = badges.join('');
                });
        }

        // Grist integration
        grist.ready();

        // Warm token cache for photo URLs
        ensureToken().catch(() => {});

        // Handle records from Grist
        grist.onRecord(function(record) {
            // For single record display, create array with just this record
            allRecords = [record];
            generateBadges(allRecords);
        });

        // Handle table data for multiple records
        grist.onRecords(function(records) {
            allRecords = records || [];
            generateBadges(allRecords);
        });

        // Handle ready event
        grist.ready({
            requiredAccess: 'read table',
            columns: [
                'Employee_ID',
                'Full_Name',
                'Position',
                'Contract_Date',
                'Contract_Start',
                'Contract_Start_Date',
                'Contract_Expiration',
                'Contract_End',
                'Training_Date',
                'Photo'
            ]
        });
    </script>
</body>
</html>
